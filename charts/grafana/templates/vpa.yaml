{{- if .Values.vpa.enabled }}
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ include "grafana.fullname" . }}-vpa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "grafana.labels" . | nindent 4 }}
spec:
  targetRef:
    apiVersion: {{ default "apps/v1" .Values.vpa.target.apiVersion | quote }}
    kind: {{ default "Deployment" .Values.vpa.target.kind | quote }}
    name: {{ default (include "grafana.fullname" .) .Values.vpa.target.name | quote }}
  updatePolicy:
    updateMode: {{ default "Off" .Values.vpa.updateMode | quote }}
  resourcePolicy:
    containerPolicies:
      - containerName: {{ default "grafana" .Values.vpa.container.name | quote }}
        controlledResources:
          - cpu
          - memory
{{- end }}
