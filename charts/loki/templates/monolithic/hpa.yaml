{{- $isMonolithic := eq (include "loki.deployment.isMonolithic" .) "true" -}}
{{- $usingObjectStorage := eq (include "loki.isUsingObjectStorage" .) "true" }}
{{- if and $isMonolithic $usingObjectStorage ( .Values.singleBinary.autoscaling.enabled ) }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "loki.monolithicFullname" . }}
  namespace: {{ include "loki.namespace" . }}
  labels:
    {{- include "loki.monolithicLabels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: {{ include "loki.monolithicFullname" . }}
  minReplicas: {{ .Values.singleBinary.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.singleBinary.autoscaling.maxReplicas }}
  {{- with .Values.singleBinary.autoscaling.behavior }}
  behavior:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  metrics:
  {{- with .Values.singleBinary.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ . }}
  {{- end }}
  {{- with .Values.singleBinary.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ . }}
  {{- end }}
{{- end }}
