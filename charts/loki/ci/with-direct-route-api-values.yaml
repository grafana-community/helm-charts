loki:
  useTestSchema: true
  storage:
    bucketNames:
      chunks: chunks
      ruler: ruler
      admin: admin
    type: s3

# Disable the nginx gateway — direct route bypasses it
gateway:
  enabled: false

route:
  enabled: true
  apiVersion: gateway.networking.k8s.io/v1
  kind: HTTPRoute
  annotations:
    test-annotation: test-value
  labels:
    test-label: test-value
  hostnames:
    - loki.example.com
  parentRefs:
    - name: my-gateway
      namespace: gateway-namespace
