# $schema: https://raw.githubusercontent.com/helm-unittest/helm-unittest/refs/heads/main/schema/helm-testsuite.json
suite: memcached service account
templates:
  - memcached/serviceaccount.yaml
  - chunks-cache/statefulset.yaml
  - results-cache/statefulset.yaml
  - config.yaml

set:
  deploymentMode: Distributed
  loki.useTestSchema: true
  loki.storage.bucketNames.chunks: chunks
  loki.storage.bucketNames.ruler: ruler
  loki.storage.bucketNames.admin: admin
  memcached.enabled: true
  chunksCache.enabled: true
  resultsCache.enabled: true

tests:
  - it: creates memcached service account by default
    asserts:
      - template: memcached/serviceaccount.yaml
        hasDocuments:
          count: 1
      - template: memcached/serviceaccount.yaml
        equal:
          path: metadata.name
          value: RELEASE-NAME-loki-memcached

  - it: does not create memcached service account when global serviceAccount.create is false
    set:
      serviceAccount.create: false
    asserts:
      - template: memcached/serviceaccount.yaml
        hasDocuments:
          count: 0

  - it: chunks-cache uses global service account name when global serviceAccount.create is false
    set:
      serviceAccount.create: false
      serviceAccount.name: global-custom-sa
    asserts:
      - template: chunks-cache/statefulset.yaml
        equal:
          path: spec.template.spec.serviceAccountName
          value: global-custom-sa
      - template: memcached/serviceaccount.yaml
        hasDocuments:
          count: 0

  - it: results-cache uses global service account name when global serviceAccount.create is false
    set:
      serviceAccount.create: false
      serviceAccount.name: global-custom-sa
    asserts:
      - template: results-cache/statefulset.yaml
        equal:
          path: spec.template.spec.serviceAccountName
          value: global-custom-sa
      - template: memcached/serviceaccount.yaml
        hasDocuments:
          count: 0

  - it: falls back to default service account when global serviceAccount.create is false and no name is set
    set:
      serviceAccount.create: false
    asserts:
      - template: chunks-cache/statefulset.yaml
        equal:
          path: spec.template.spec.serviceAccountName
          value: default
      - template: results-cache/statefulset.yaml
        equal:
          path: spec.template.spec.serviceAccountName
          value: default
