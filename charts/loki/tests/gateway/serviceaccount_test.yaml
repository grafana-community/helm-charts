# $schema: https://raw.githubusercontent.com/helm-unittest/helm-unittest/refs/heads/main/schema/helm-testsuite.json
suite: gateway service account
templates:
  - gateway/serviceaccount.yaml
  - gateway/deployment.yaml
  - gateway/configmap.yaml
  - config.yaml

set:
  gateway.enabled: true
  loki.useTestSchema: true
  loki.storage.bucketNames.chunks: chunks
  loki.storage.bucketNames.ruler: ruler
  loki.storage.bucketNames.admin: admin

tests:
  - it: creates gateway service account by default
    asserts:
      - template: gateway/serviceaccount.yaml
        hasDocuments:
          count: 1
      - template: gateway/serviceaccount.yaml
        equal:
          path: metadata.name
          value: RELEASE-NAME-loki-gateway
      - template: gateway/deployment.yaml
        equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-loki-gateway

  - it: does not create gateway service account when global serviceAccount.create is false
    set:
      serviceAccount.create: false
    asserts:
      - template: gateway/serviceaccount.yaml
        hasDocuments:
          count: 0

  - it: uses global service account name when global serviceAccount.create is false
    set:
      serviceAccount.create: false
      serviceAccount.name: global-custom-sa
    asserts:
      - template: gateway/deployment.yaml
        equal:
          path: spec.template.spec.serviceAccountName
          value: global-custom-sa
      - template: gateway/serviceaccount.yaml
        hasDocuments:
          count: 0

  - it: falls back to default service account when global serviceAccount.create is false and no name is set
    set:
      serviceAccount.create: false
    asserts:
      - template: gateway/deployment.yaml
        equal:
          path: spec.template.spec.serviceAccountName
          value: default

  - it: uses gateway serviceAccount.name override regardless of create flag
    set:
      gateway.serviceAccount.name: gateway-custom-sa
    asserts:
      - template: gateway/deployment.yaml
        equal:
          path: spec.template.spec.serviceAccountName
          value: gateway-custom-sa
