# $schema: https://raw.githubusercontent.com/helm-unittest/helm-unittest/refs/heads/main/schema/helm-testsuite.json
suite: gateway PodDisruptionBudget
templates:
  - templates/gateway/pdb.yaml
set:
  gateway.enabled: true
tests:
  - it: should render when replicas > 1
    set:
      gateway.replicas: 2
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: PodDisruptionBudget

  - it: should set default maxUnavailable to 1
    set:
      gateway.replicas: 2
    asserts:
      - equal:
          path: spec.maxUnavailable
          value: 1

  - it: should not render when replicas is 1 and autoscaling is disabled
    set:
      gateway.replicas: 1
      gateway.autoscaling.enabled: false
      gateway.kedaAutoscaling.enabled: false
    asserts:
      - hasDocuments:
          count: 0
