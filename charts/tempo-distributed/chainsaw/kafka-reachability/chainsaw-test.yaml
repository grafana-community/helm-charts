apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: kafka-reachability
spec:
  # Fixed namespace so the Kafka broker is reachable at
  # kafka.kafka-ci.svc.cluster.local:9092 by ct install scenarios
  # that run after this test completes.
  namespace: kafka-ci
  # Keep the namespace so Kafka is still running when ct install executes.
  skipDelete: true
  steps:
    - name: provision-kafka
      try:
        - apply:
            file: kafka.yaml
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: kafka
              status:
                availableReplicas: 1
      catch:
        - describe:
            apiVersion: apps/v1
            kind: Deployment
            name: kafka
        - podLogs:
            selector: app=kafka

    - name: verify-reachability
      try:
        - apply:
            file: probe-job.yaml
        - assert:
            resource:
              apiVersion: batch/v1
              kind: Job
              metadata:
                name: kafka-probe
              status:
                succeeded: 1
      catch:
        - describe:
            apiVersion: batch/v1
            kind: Job
            name: kafka-probe
        - podLogs:
            selector: job-name=kafka-probe
