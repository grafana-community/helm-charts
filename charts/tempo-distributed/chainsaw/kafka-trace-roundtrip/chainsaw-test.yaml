apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: kafka-trace-roundtrip
spec:
  # Fixed namespace so the Kafka broker persists at
  # kafka.kafka-ci.svc.cluster.local:9092 after this test completes.
  # ct install's kafka-ingest-values.yaml scenario reuses it without needing
  # a separate workflow provisioning step.
  namespace: kafka-ci
  skipDelete: true
  steps:
    - name: provision-kafka
      try:
        - apply:
            file: kafka.yaml
        - assert:
            timeout: 5m
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: kafka
                namespace: kafka-ci
              status:
                availableReplicas: 1
      catch:
        - describe:
            apiVersion: apps/v1
            kind: Deployment
            name: kafka
        - podLogs:
            selector: app=kafka

    - name: install-chart
      try:
        - script:
            timeout: 10m
            content: |
              helm dependency update ./charts/tempo-distributed
              helm install tempo-distributed ./charts/tempo-distributed \
                --namespace "$NAMESPACE" \
                --set backendScheduler.enabled=true \
                --set blockBuilder.enabled=true \
                --set blockBuilder.replicas=1 \
                --set liveStore.enabled=true \
                --set liveStore.replicas=1 \
                --set ingester.enabled=false \
                --set ingest.kafka.address=kafka.kafka-ci.svc.cluster.local:9092 \
                --set ingest.kafka.auto_create_topic_default_partitions=1 \
                --set traces.otlp.http.enabled=true \
                --wait --timeout 600s
      catch:
        - describe:
            apiVersion: apps/v1
            kind: StatefulSet
        - podLogs: {}

    - name: push-trace
      try:
        - apply:
            file: push-trace-job.yaml
        - assert:
            timeout: 2m
            resource:
              apiVersion: batch/v1
              kind: Job
              metadata:
                name: push-trace
              status:
                succeeded: 1
      catch:
        - describe:
            apiVersion: batch/v1
            kind: Job
            name: push-trace
        - podLogs:
            selector: job-name=push-trace

    - name: query-trace-by-id
      try:
        - apply:
            file: query-trace-job.yaml
        - assert:
            timeout: 3m
            resource:
              apiVersion: batch/v1
              kind: Job
              metadata:
                name: query-trace
              status:
                succeeded: 1
      catch:
        - describe:
            apiVersion: batch/v1
            kind: Job
            name: query-trace
        - podLogs:
            selector: job-name=query-trace

    - name: search-trace
      try:
        - apply:
            file: search-job.yaml
        - assert:
            timeout: 3m
            resource:
              apiVersion: batch/v1
              kind: Job
              metadata:
                name: search-trace
              status:
                succeeded: 1
      catch:
        - describe:
            apiVersion: batch/v1
            kind: Job
            name: search-trace
        - podLogs:
            selector: job-name=search-trace
