apiVersion: batch/v1
kind: Job
metadata:
  name: search-trace
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: search
          # renovate: docker=docker.io/curlimages/curl
          image: curlimages/curl:8.13.0
          command:
            - sh
            - -c
            - |
              # Search for the span by name using TraceQL.
              # The live-store indexes recent spans for search queries.
              for i in $(seq 1 60); do
                result=$(curl -sf \
                  'http://tempo-distributed-query-frontend:3200/api/search?q=%7Bname%3D"chainsaw-trace-roundtrip"%7D&limit=5' \
                  2>/dev/null)
                if [ -n "$result" ] && echo "$result" | grep -q "chainsaw-trace-roundtrip"; then
                  echo "Search found trace: $result"
                  exit 0
                fi
                echo "Attempt $i: trace not yet in search index, retrying in 2s..."
                sleep 2
              done
              echo "Trace not found in search index after 2 minutes"
              exit 1
