apiVersion: v1
kind: Namespace
metadata:
  name: minio-ci
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: minio-ci
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
        ci-managed: "true"
    spec:
      containers:
        - name: minio
          # renovate: docker=docker.io/pgsty/minio
          image: pgsty/minio:RELEASE.2026-04-17T00-00-00Z
          # A directory under the data root is served as a bucket.
          command:
            - sh
            - -ec
            - mkdir -p /data/tempo-traces && exec minio server /data
          ports:
            - containerPort: 9000
              name: s3
          env:
            - name: MINIO_ROOT_USER
              value: "grafana-tempo"
            - name: MINIO_ROOT_PASSWORD
              value: "supersecret"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: minio-ci
spec:
  selector:
    app: minio
  ports:
    - name: s3
      port: 9000
      targetPort: 9000
