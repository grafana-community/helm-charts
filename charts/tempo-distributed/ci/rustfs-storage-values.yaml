ingest:
  kafka:
    address: "kafka.kafka-ci.svc.cluster.local:9092"
    auto_create_topic_default_partitions: 1

storage:
  trace:
    backend: s3
    s3:
      bucket: tempo-traces
      endpoint: rustfs.rustfs-ci.svc.cluster.local:9000
      access_key: rustfsadmin
      secret_key: rustfsadmin
      insecure: true

traces:
  otlp:
    http:
      enabled: true

tests:
  integration:
    enabled: true
