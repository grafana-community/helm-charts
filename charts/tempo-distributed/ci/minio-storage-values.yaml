blockBuilder:
  replicas: 1

liveStore:
  replicas: 1

ingest:
  kafka:
    address: "kafka.kafka-ci.svc.cluster.local:9092"
    auto_create_topic_default_partitions: 1

storage:
  trace:
    backend: s3
    s3:
      bucket: tempo-traces
      endpoint: minio.minio-ci.svc.cluster.local:9000
      access_key: grafana-tempo
      secret_key: supersecret
      insecure: true

traces:
  otlp:
    http:
      enabled: true

tests:
  integration:
    enabled: true
