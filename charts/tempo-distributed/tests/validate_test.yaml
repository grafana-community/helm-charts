# $schema: https://raw.githubusercontent.com/helm-unittest/helm-unittest/refs/heads/main/schema/helm-testsuite.json
suite: render-time validation
templates:
  - validate.yaml

tests:
  - it: fails when the removed minio subchart is enabled
    set:
      minio.enabled: true
      ingest.kafka.address: kafka:9092
    asserts:
      - failedTemplate:
          errorMessage: "The built-in MinIO subchart has been removed from the tempo-distributed chart, so the minio.* values are no longer honored. Deploy MinIO (or any S3-compatible object store) externally and configure storage.trace.s3 to point at it, then remove the minio block from your values. See UPGRADE.md for a migration path that preserves your existing MinIO data."

  - it: fails when blockBuilder is enabled without a kafka address
    set:
      blockBuilder.enabled: true
      liveStore.enabled: false
      ingest.kafka.address: ""
    asserts:
      - failedTemplate:
          errorMessage: "ingest.kafka.address is required when blockBuilder or liveStore is enabled. Tempo 3.0 uses a Kafka-backed write path: block-builder and live-store consume spans from Kafka and will not start without a broker. Set ingest.kafka.address to your Kafka broker (e.g. \"kafka.kafka-namespace.svc.cluster.local:9092\"), or disable blockBuilder and liveStore. See UPGRADE.md for details."

  - it: fails when liveStore is enabled without a kafka address
    set:
      blockBuilder.enabled: false
      liveStore.enabled: true
      ingest.kafka.address: ""
    asserts:
      - failedTemplate:
          errorMessage: "ingest.kafka.address is required when blockBuilder or liveStore is enabled. Tempo 3.0 uses a Kafka-backed write path: block-builder and live-store consume spans from Kafka and will not start without a broker. Set ingest.kafka.address to your Kafka broker (e.g. \"kafka.kafka-namespace.svc.cluster.local:9092\"), or disable blockBuilder and liveStore. See UPGRADE.md for details."

  - it: renders nothing when kafka is configured and minio is unset
    set:
      ingest.kafka.address: kafka:9092
    asserts:
      - hasDocuments:
          count: 0

  - it: renders nothing when the kafka write path is disabled
    set:
      blockBuilder.enabled: false
      liveStore.enabled: false
      ingest.kafka.address: ""
    asserts:
      - hasDocuments:
          count: 0
