{{- if .Values.backendScheduler.enabled }}
{{- $dict := dict "ctx" . "component" "backend-scheduler" "memberlist" true -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ template "tempo.resourceName" $dict }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tempo.labels" $dict | nindent 4 }}
    {{- with .Values.backendScheduler.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.backendScheduler.annotations }}
  annotations:
  {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: 1
  revisionHistoryLimit: {{ .Values.tempo.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "tempo.selectorLabels" $dict | nindent 6 }}
  serviceName: backend-scheduler
  podManagementPolicy: Parallel
  updateStrategy:
    {{- toYaml .Values.backendScheduler.statefulStrategy | nindent 4 }}
  template:
    metadata:
      labels:
        {{- include "tempo.podLabels" $dict | nindent 8 }}
        {{- with .Values.tempo.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.backendWorker.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-tempo.yaml") . | sha256sum }}
        {{- if .Values.backendScheduler.persistence.enabled }}
        storage/size: {{ .Values.backendScheduler.persistence.size | quote }}
        {{- end }}
        {{- with .Values.tempo.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.backendScheduler.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- if or (.Values.backendScheduler.priorityClassName) (.Values.global.priorityClassName) }}
      priorityClassName: {{ default .Values.backendScheduler.priorityClassName .Values.global.priorityClassName }}
      {{- end }}
      serviceAccountName: {{ include "tempo.serviceAccountName" . }}
      {{- with .Values.tempo.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      enableServiceLinks: false
      {{- include "tempo.componentImagePullSecrets" (dict "ctx" . "component" "backend-scheduler") | nindent 6 -}}
      {{- with .Values.backendScheduler.hostAliases }}
      hostAliases:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- toYaml .Values.backendScheduler.initContainers | nindent 8 }}
      containers:
        - args:
            - -target=backend-scheduler
            - -config.file=/conf/tempo.yaml
            {{- with .Values.backendScheduler.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with .Values.global.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          image: {{ include "tempo.imageReference" $dict }}
          imagePullPolicy: {{ .Values.tempo.image.pullPolicy }}
          name: backend-scheduler
          ports:
            - name: grpc
              containerPort: 9095
            - name: http-metrics
              containerPort: 3200
          {{- include "tempo.componentEnv" (dict "extraEnv" (concat .Values.global.extraEnv .Values.backendScheduler.extraEnv) "resources" .Values.backendScheduler.resources "factor" .Values.global.goSettings.goMemLimitFactor "gogc" .Values.global.goSettings.gogc) | nindent 10 }}
          {{- if or .Values.global.extraEnvFrom .Values.backendScheduler.extraEnvFrom }}
          envFrom:
            {{- with .Values.global.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with .Values.backendScheduler.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- with or .Values.backendScheduler.livenessProbe .Values.tempo.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with or .Values.backendScheduler.readinessProbe .Values.tempo.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.backendScheduler.resources | nindent 12 }}
          {{- with .Values.tempo.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - mountPath: /conf
              name: config
            - mountPath: /runtime-config
              name: runtime-config
            - mountPath: /var/tempo
              name: tempo-backend-scheduler-store
            {{- if .Values.enterprise.enabled }}
            - name: license
              mountPath: /license
            {{- end }}
            {{- with .Values.backendScheduler.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      {{- with .Values.backendScheduler.extraContainers }}
      {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.backendScheduler.terminationGracePeriodSeconds }}
      {{- if semverCompare ">= 1.19-0" .Capabilities.KubeVersion.Version }}
      {{- with .Values.backendScheduler.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- tpl . $ | nindent 8 }}
      {{- end }}
      {{- end }}
      {{- with .Values.backendScheduler.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.backendWorker.dnsConfigOverides.enabled }}
      {{- with .Values.backendWorker.dnsConfigOverides.dnsConfig }}
      dnsConfig:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      volumes:
        - name: config
          {{- include "tempo.configVolume" . | nindent 10 }}
        - name: runtime-config
          {{- include "tempo.runtimeVolume" . | nindent 10 }}
      {{- if .Values.enterprise.enabled }}
        - name: license
          secret:
            secretName: {{ tpl .Values.license.secretName . }}
      {{- end }}
      {{- with .Values.backendScheduler.extraVolumes }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- if not .Values.backendScheduler.persistence.enabled }}
        - name: tempo-backend-scheduler-store
          emptyDir: {}
{{- else if .Values.backendScheduler.persistence.inMemory }}
        - name: tempo-backend-scheduler-store
        {{- if .Values.backendScheduler.persistence.inMemory }}
          emptyDir:
            medium: Memory
        {{- end }}
        {{- if .Values.backendScheduler.persistence.size }}
            sizeLimit: {{ .Values.backendScheduler.persistence.size }}
        {{- end }}
{{- else }}
  {{- if .Values.backendScheduler.persistentVolumeClaimRetentionPolicy.enabled }}
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: {{ .Values.backendScheduler.persistentVolumeClaimRetentionPolicy.whenDeleted }}
    whenScaled: {{ .Values.backendScheduler.persistentVolumeClaimRetentionPolicy.whenScaled }}
  {{- end }}
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        {{- with .Values.backendScheduler.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.backendScheduler.persistence.labels }}
        labels:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        name: data
      spec:
        {{- $storageClass := coalesce .Values.backendScheduler.persistence.storageClass .Values.global.storageClass }}
        {{- if eq $storageClass "-" }}
        storageClassName: ""
        {{- else if $storageClass }}
        storageClassName: {{ $storageClass }}
        {{- end }}
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.backendScheduler.persistence.size | quote }}
  {{- end }}
---
{{- end }}
